name: Deploy Morgue Manager Web

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MorgueManager.Web/package-lock.json

      - name: Install npm packages
        run: npm ci
        working-directory: MorgueManager.Web

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish project
        run: dotnet publish MorgueManager.Web.csproj -c Release -o publish
        working-directory: MorgueManager.Web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: morgue-manager
          directory: MorgueManager.Web/publish/wwwroot
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
